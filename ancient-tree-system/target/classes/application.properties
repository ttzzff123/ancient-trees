spring.application.name=ancient-tree-system

# ==========================================
# 古树名木管理系统 - 数据库配置
# ==========================================

# 1. 数据库连接信息（改成你自己的密码！）
spring.datasource.url=jdbc:mysql://localhost:3306/ancient_tree_system?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=tzf19990511
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 2. 连接池配置（HikariCP - Spring Boot默认）
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000

# 3. JPA配置（自动建表，开发阶段用）
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# 4. MyBatis配置
mybatis.mapper-locations=classpath:mapper/*.xml
mybatis.type-aliases-package=com.example.ancienttreesystem.entity

# 5. 服务器端口
server.port=8080

# 6. 日志配置（方便调试）
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.com.example.ancienttreesystem.mapper=DEBUG

# 7. 文件上传配置（新增！）
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB